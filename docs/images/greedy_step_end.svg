<svg xmlns="http://www.w3.org/2000/svg" width="860" height="230" viewBox="0 0 860 230">
  <rect width="100%" height="100%" fill="#0b1020"/>
  <text x="24" y="34" fill="#ffffff" font-size="20" font-family="Arial, sans-serif">Greedy：终止状态（达到目标或已无法提升）</text>
  <text x="24" y="62" fill="#9aa4b2" font-size="14" font-family="Arial, sans-serif">终止条件：缺口 ≤ 0 或所有课程达到满分</text>

  <g transform="translate(24,90)">
    <text x="0" y="16" fill="#cbd5e1" font-size="14" font-family="Arial, sans-serif">English</text>
    <rect x="90" y="4" width="330" height="16" rx="8" fill="#1f2937"/>
    <rect x="90" y="4" width="310" height="16" rx="8" fill="#22c55e"/>
    <text x="430" y="16" fill="#cbd5e1" font-size="14" font-family="Arial, sans-serif">3.75</text>

    <text x="0" y="52" fill="#cbd5e1" font-size="14" font-family="Arial, sans-serif">Math</text>
    <rect x="90" y="40" width="330" height="16" rx="8" fill="#1f2937"/>
    <rect x="90" y="40" width="278" height="16" rx="8" fill="#22c55e"/>
    <text x="430" y="52" fill="#cbd5e1" font-size="14" font-family="Arial, sans-serif">3.37</text>

    <text x="0" y="88" fill="#cbd5e1" font-size="14" font-family="Arial, sans-serif">Physics</text>
    <rect x="90" y="76" width="330" height="16" rx="8" fill="#1f2937"/>
    <rect x="90" y="76" width="250" height="16" rx="8" fill="#f59e0b"/>
    <text x="430" y="88" fill="#cbd5e1" font-size="14" font-family="Arial, sans-serif">3.03</text>

    <text x="0" y="124" fill="#cbd5e1" font-size="14" font-family="Arial, sans-serif">Art</text>
    <rect x="90" y="112" width="330" height="16" rx="8" fill="#1f2937"/>
    <rect x="90" y="112" width="320" height="16" rx="8" fill="#22c55e"/>
    <text x="430" y="124" fill="#cbd5e1" font-size="14" font-family="Arial, sans-serif">3.88</text>

    <rect x="520" y="4" width="310" height="128" rx="12" fill="#0f172a" stroke="#334155"/>
    <text x="540" y="30" fill="#e2e8f0" font-size="14" font-family="Arial, sans-serif">结果摘要</text>
    <text x="540" y="56" fill="#9aa4b2" font-size="12" font-family="Arial, sans-serif">缺口被填满，计划输出</text>
    <text x="540" y="80" fill="#22c55e" font-size="12" font-family="Arial, sans-serif">绿色：维持/接近</text>
    <text x="540" y="102" fill="#f59e0b" font-size="12" font-family="Arial, sans-serif">橙色：仍需重点投入</text>
  </g>
</svg>

