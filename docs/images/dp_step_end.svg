<svg xmlns="http://www.w3.org/2000/svg" width="860" height="240" viewBox="0 0 860 240">
  <rect width="100%" height="100%" fill="#0b1020"/>
  <text x="24" y="34" fill="#ffffff" font-size="20" font-family="Arial, sans-serif">DP：终止（得到最优值）</text>
  <text x="24" y="62" fill="#9aa4b2" font-size="14" font-family="Arial, sans-serif">遍历完所有升级包后，dp[B]（或 max dp）即为最优解</text>

  <g transform="translate(24,95)">
    <rect x="0" y="0" width="812" height="120" rx="14" fill="#0f172a" stroke="#334155"/>
    <text x="18" y="30" fill="#e2e8f0" font-size="14" font-family="Arial, sans-serif">输出：best = max(dp)</text>
    <text x="18" y="60" fill="#9aa4b2" font-size="12" font-family="Arial, sans-serif">如果需要还原方案：额外记录路径（空间会增大）</text>
    <text x="18" y="90" fill="#9aa4b2" font-size="12" font-family="Arial, sans-serif">工程中常用：只要最优值 → O(B) 空间即可</text>
  </g>
</svg>

