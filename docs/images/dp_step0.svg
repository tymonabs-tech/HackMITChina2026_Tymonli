<svg xmlns="http://www.w3.org/2000/svg" width="860" height="230" viewBox="0 0 860 230">
  <rect width="100%" height="100%" fill="#0b1020"/>
  <text x="24" y="34" fill="#ffffff" font-size="20" font-family="Arial, sans-serif">DP：初始状态（dp 数组）</text>
  <text x="24" y="62" fill="#9aa4b2" font-size="14" font-family="Arial, sans-serif">dp[b] 表示预算 b 下可达到的最大收益</text>

  <g transform="translate(24,95)">
    <rect x="0" y="0" width="812" height="110" rx="14" fill="#0f172a" stroke="#334155"/>
    <text x="18" y="28" fill="#e2e8f0" font-size="14" font-family="Arial, sans-serif">dp = [0, -inf, -inf, -inf, ...]</text>
    <text x="18" y="56" fill="#9aa4b2" font-size="12" font-family="Arial, sans-serif">初始化：dp[0]=0，其余为不可达</text>
    <text x="18" y="84" fill="#9aa4b2" font-size="12" font-family="Arial, sans-serif">后续对每个“升级包”做状态转移</text>
  </g>
</svg>

