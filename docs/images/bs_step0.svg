<svg xmlns="http://www.w3.org/2000/svg" width="860" height="210" viewBox="0 0 860 210">
  <rect width="100%" height="100%" fill="#0b1020"/>
  <text x="24" y="34" fill="#ffffff" font-size="20" font-family="Arial, sans-serif">Binary Search：初始区间</text>
  <text x="24" y="62" fill="#9aa4b2" font-size="14" font-family="Arial, sans-serif">用可行性判定 Feasible(G) 在单调区间内二分最优目标</text>

  <g transform="translate(60,110)">
    <line x1="0" y1="0" x2="720" y2="0" stroke="#334155" stroke-width="4" stroke-linecap="round"/>
    <text x="-12" y="28" fill="#9aa4b2" font-size="12" font-family="Arial, sans-serif">L</text>
    <text x="706" y="28" fill="#9aa4b2" font-size="12" font-family="Arial, sans-serif">R</text>
    <circle cx="0" cy="0" r="7" fill="#60a5fa"/>
    <circle cx="720" cy="0" r="7" fill="#60a5fa"/>
    <text x="0" y="-16" fill="#e2e8f0" font-size="12" font-family="Arial, sans-serif">3.0</text>
    <text x="690" y="-16" fill="#e2e8f0" font-size="12" font-family="Arial, sans-serif">4.0</text>
    <rect x="0" y="42" width="720" height="44" rx="10" fill="#0f172a" stroke="#334155"/>
    <text x="16" y="70" fill="#9aa4b2" font-size="12" font-family="Arial, sans-serif">规则：如果 mid 可行，则向右收缩，否则向左收缩</text>
  </g>
</svg>

