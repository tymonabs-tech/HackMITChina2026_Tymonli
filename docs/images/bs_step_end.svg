<svg xmlns="http://www.w3.org/2000/svg" width="860" height="220" viewBox="0 0 860 220">
  <rect width="100%" height="100%" fill="#0b1020"/>
  <text x="24" y="34" fill="#ffffff" font-size="20" font-family="Arial, sans-serif">Binary Search：终止（收敛到答案）</text>
  <text x="24" y="62" fill="#9aa4b2" font-size="14" font-family="Arial, sans-serif">当 L 与 R 足够接近（或整数区间 L==R）时结束</text>

  <g transform="translate(60,120)">
    <line x1="0" y1="0" x2="720" y2="0" stroke="#334155" stroke-width="4" stroke-linecap="round"/>
    <circle cx="420" cy="0" r="10" fill="#22c55e"/>
    <text x="402" y="-16" fill="#e2e8f0" font-size="12" font-family="Arial, sans-serif">L=R</text>

    <rect x="470" y="-44" width="320" height="84" rx="12" fill="#0f172a" stroke="#334155"/>
    <text x="486" y="-14" fill="#e2e8f0" font-size="13" font-family="Arial, sans-serif">输出：最小可行 / 最大可行</text>
    <text x="486" y="8" fill="#9aa4b2" font-size="12" font-family="Arial, sans-serif">取决于你定义的二分边界与更新规则</text>
  </g>
</svg>

